services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: farmchain
      POSTGRES_USER: farmchain
      POSTGRES_PASSWORD: farmchain_dev
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmchain -d farmchain"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (optional — profile: backend) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://farmchain:farmchain_dev@postgres:5432/farmchain
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [backend, full]

volumes:
  postgres_data:
